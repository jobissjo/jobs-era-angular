<div class="login-wrapper">
    <div class="login-card">
        <mat-progress-bar mode="indeterminate" *ngIf="isLoading" class="custom-progress-bar"></mat-progress-bar>
        
        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your JobsEra account</p>
        </div>

        <form [formGroup]="signInForm" (ngSubmit)="onSubmitForm()">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="material-icons field-icon">person_outline</span>
                    <input type="text" id="username" formControlName="username" placeholder="Enter your username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="material-icons field-icon">lock_outline</span>
                    <input type="password" id="password" formControlName="password" placeholder="Enter your password">
                </div>
                <div class="error-msg-container" *ngIf="checkInValid('password')">
                    <span class="material-icons error-icon">error_outline</span>
                    <span class="error-text">Password must be at least 8 characters long</span>
                </div>
            </div>

            <button type="submit" class="btn-submit" [disabled]="signInForm.invalid">Sign In</button>

            <div class="login-footer">
                <p>Don't have an account? <a [routerLink]="'/auth/sign-up'" class="signup-link">Sign Up</a></p>
                <a [routerLink]="'/auth/forgot-password'" class="forgot-link">Forgot Password?</a>
            </div>
        </form>
    </div>
</div>
